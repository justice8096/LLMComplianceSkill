name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-js:
    name: JavaScript syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check all JavaScript files
        run: |
          find . -name "*.js" -not -path "./.git/*" -not -path "./docs/*" | sort | while read -r f; do
            echo "Checking: $f"
            node --check "$f" || exit 1
          done
